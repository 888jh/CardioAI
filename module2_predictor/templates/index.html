<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioAI - 心血管疾病风险预测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input[type="number"]::-webkit-inner-spin-button,
        .form-group input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 30px;
            border-radius: 15px;
            animation: slideIn 0.5s ease-out;
        }

        .result.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .result-header h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .risk-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: 700;
            color: white;
            margin: 10px 0;
        }

        .probability {
            font-size: 2.5em;
            font-weight: 700;
            margin: 15px 0;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .detail-item {
            padding: 10px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .detail-item strong {
            display: block;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .detail-item span {
            color: #2c3e50;
            font-size: 1.1em;
            font-weight: 600;
        }

        .btn-reset {
            width: 100%;
            padding: 12px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            background: #667eea;
            color: white;
        }

        .error {
            display: none;
            background: #fee;
            border: 2px solid #e74c3c;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            color: #c0392b;
        }

        .error.active {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
            color: #95a5a6;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>❤️ CardioAI 心血管疾病风险预测</h1>
            <p>基于机器学习的智能健康评估系统</p>
        </div>

        <!-- 预测表单 -->
        <form id="predictionForm">
            <div class="form-grid">
                <!-- 年龄 -->
                <div class="form-group">
                    <label for="age">年龄（天数） *</label>
                    <input type="number" id="age" name="age" required 
                           min="1" max="30000" placeholder="例如: 18393 (约50岁)">
                </div>

                <!-- 性别 -->
                <div class="form-group">
                    <label for="gender">性别 *</label>
                    <select id="gender" name="gender" required>
                        <option value="">请选择</option>
                        <option value="1">👩 女性</option>
                        <option value="2">👨 男性</option>
                    </select>
                </div>

                <!-- 身高 -->
                <div class="form-group">
                    <label for="height">身高（cm） *</label>
                    <input type="number" id="height" name="height" required 
                           min="100" max="250" placeholder="例如: 168">
                </div>

                <!-- 体重 -->
                <div class="form-group">
                    <label for="weight">体重（kg） *</label>
                    <input type="number" id="weight" name="weight" required 
                           min="30" max="200" placeholder="例如: 62">
                </div>

                <!-- 收缩压 -->
                <div class="form-group">
                    <label for="ap_hi">收缩压（mmHg） *</label>
                    <input type="number" id="ap_hi" name="ap_hi" required 
                           min="70" max="300" placeholder="例如: 110">
                </div>

                <!-- 舒张压 -->
                <div class="form-group">
                    <label for="ap_lo">舒张压（mmHg） *</label>
                    <input type="number" id="ap_lo" name="ap_lo" required 
                           min="40" max="200" placeholder="例如: 80">
                </div>

                <!-- 胆固醇 -->
                <div class="form-group">
                    <label for="cholesterol">胆固醇水平 *</label>
                    <select id="cholesterol" name="cholesterol" required>
                        <option value="">请选择</option>
                        <option value="1">✅ 正常</option>
                        <option value="2">⚠️ 高于正常</option>
                        <option value="3">🔴 远高于正常</option>
                    </select>
                </div>

                <!-- 血糖 -->
                <div class="form-group">
                    <label for="gluc">血糖水平 *</label>
                    <select id="gluc" name="gluc" required>
                        <option value="">请选择</option>
                        <option value="1">✅ 正常</option>
                        <option value="2">⚠️ 高于正常</option>
                        <option value="3">🔴 远高于正常</option>
                    </select>
                </div>

                <!-- 吸烟 -->
                <div class="form-group">
                    <label for="smoke">是否吸烟 *</label>
                    <select id="smoke" name="smoke" required>
                        <option value="">请选择</option>
                        <option value="0">🚭 否</option>
                        <option value="1">🚬 是</option>
                    </select>
                </div>

                <!-- 饮酒 -->
                <div class="form-group">
                    <label for="alco">是否饮酒 *</label>
                    <select id="alco" name="alco" required>
                        <option value="">请选择</option>
                        <option value="0">🚫 否</option>
                        <option value="1">🍺 是</option>
                    </select>
                </div>

                <!-- 运动 -->
                <div class="form-group">
                    <label for="active">是否定期运动 *</label>
                    <select id="active" name="active" required>
                        <option value="">请选择</option>
                        <option value="0">❌ 否</option>
                        <option value="1">✅ 是</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                🔍 开始预测
            </button>
        </form>

        <!-- 加载动画 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在分析您的健康数据...</p>
        </div>

        <!-- 错误提示 -->
        <div class="error" id="error"></div>

        <!-- 预测结果 -->
        <div class="result" id="result">
            <div class="result-header">
                <h2>📊 预测结果</h2>
                <div class="risk-badge" id="riskBadge"></div>
                <div class="probability" id="probability"></div>
                <p id="predictionLabel"></p>
            </div>

            <div class="result-details">
                <h3 style="margin-bottom: 15px; color: #2c3e50;">📋 输入数据摘要</h3>
                <div class="detail-grid" id="detailGrid"></div>
            </div>

            <button class="btn-reset" onclick="resetForm()">🔄 重新预测</button>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            <p>💻 CardioAI - 心血管疾病智能辅助系统 | Module 2: 风险预测模型</p>
            <p>🔬 基于 XGBoost 机器学习算法 | 仅供参考，不作为医疗诊断依据</p>
        </div>
    </div>

    <script>
        // 表单提交处理
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 隐藏之前的结果和错误
            document.getElementById('result').classList.remove('active');
            document.getElementById('error').classList.remove('active');

            // 显示加载动画
            document.getElementById('loading').classList.add('active');
            document.getElementById('submitBtn').disabled = true;

            // 收集表单数据
            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = parseInt(value);
            });

            try {
                // 调用预测 API
                const response = await fetch('/predict_cardio', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                // 隐藏加载动画
                document.getElementById('loading').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;

                if (result.success) {
                    // 显示预测结果
                    displayResult(result);
                } else {
                    // 显示错误
                    showError(result.error || '预测失败，请重试');
                }
            } catch (error) {
                // 隐藏加载动画
                document.getElementById('loading').classList.remove('active');
                document.getElementById('submitBtn').disabled = false;

                // 显示错误
                showError('网络请求失败: ' + error.message);
            }
        });

        // 显示预测结果
        function displayResult(result) {
            // 设置风险徽章
            const riskBadge = document.getElementById('riskBadge');
            riskBadge.textContent = result.risk_level;
            riskBadge.style.backgroundColor = result.risk_color;

            // 设置概率
            document.getElementById('probability').textContent = result.probability_percent;
            document.getElementById('probability').style.color = result.risk_color;

            // 设置预测标签
            document.getElementById('predictionLabel').textContent = result.prediction_label;

            // 设置输入摘要
            const detailGrid = document.getElementById('detailGrid');
            detailGrid.innerHTML = '';
            
            for (const [key, value] of Object.entries(result.input_summary)) {
                const detailItem = document.createElement('div');
                detailItem.className = 'detail-item';
                detailItem.innerHTML = `
                    <strong>${key}</strong>
                    <span>${value}</span>
                `;
                detailGrid.appendChild(detailItem);
            }

            // 显示结果区域
            document.getElementById('result').classList.add('active');
            
            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('active');
        }

        // 重置表单
        function resetForm() {
            document.getElementById('predictionForm').reset();
            document.getElementById('result').classList.remove('active');
            document.getElementById('error').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 年龄天数辅助转换提示
        document.getElementById('age').addEventListener('input', (e) => {
            const days = parseInt(e.target.value);
            if (days > 0) {
                const years = Math.round(days / 365);
                e.target.title = `约 ${years} 岁`;
            }
        });
    </script>
</body>
</html>
